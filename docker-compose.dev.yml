# Devbox hot-reload dev server: Vite + HMR against the live source tree,
# proxying /api to the deployed demos-api container.
#
#   make dev-box   → https://demos-dev.nonsh.site (tailnet, Authelia-gated)
#
# node_modules and the pnpm store live in named volumes so installs never
# touch the host tree.
name: demos-dev
services:
  dev:
    image: node:24-slim
    container_name: demos-dev
    working_dir: /app
    command:
      - sh
      - -c
      - corepack enable && pnpm install && pnpm dev --host
    environment:
      - DEMOS_API_PROXY=http://demos-api:3000
      - PNPM_CONFIG_MINIMUM_RELEASE_AGE=0
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - pnpm_store:/app/.pnpm-store
    labels:
      com.box.project: demos
      com.box.service: dev
      com.box.tier: frontend
      com.box.managed-by: agent
    networks: [edge]
    restart: unless-stopped
networks:
  edge: { external: true }
volumes:
  node_modules:
  pnpm_store:
