name: demos
services:
  demos:
    build: .
    image: demos:latest
    container_name: demos
    labels:
      com.box.project: demos
      com.box.service: web
      com.box.tier: frontend
      com.box.managed-by: agent
    networks: [edge]
    restart: unless-stopped
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: demos-api:latest
    container_name: demos-api
    environment:
      # injected from Infisical /demos by the systemd unit
      - DEMOS_DB_PASSWORD=${DEMOS_DB_PASSWORD:?inject_via_infisical}
    labels:
      com.box.project: demos
      com.box.service: api
      com.box.tier: backend
      com.box.managed-by: agent
    networks: [edge, internal]
    restart: unless-stopped
  # Public ingress: outbound-only Cloudflare Tunnel (no inbound ports on the
  # VM). Routes demos.nonsh.site from the internet to demos/demos-api directly,
  # bypassing Caddy/Authelia — the tailnet route through Caddy stays gated.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: demos-cloudflared
    # --metrics exposes cloudflared's native Prometheus /metrics endpoint.
    # 0.0.0.0:2000 so Prometheus can scrape it over the internal network
    # (the endpoint is unauthenticated, hence kept off any public interface).
    command: ["tunnel", "--no-autoupdate", "--metrics", "0.0.0.0:2000", "run"]
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN:?inject_via_infisical}
    labels:
      com.box.project: demos
      com.box.service: cloudflared
      com.box.tier: agent
      com.box.managed-by: agent
    # edge: reach demos/demos-api + Cloudflare egress. internal: Prometheus scrape.
    networks: [edge, internal]
    restart: unless-stopped
networks:
  edge: { external: true }
  internal: { external: true }
