server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # in-container API route so the app works on any access path; the docker
    # DNS resolver keeps the upstream fresh if demos-api is recreated alone
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $api demos-api:3000;
        proxy_pass http://$api;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
