# Self-contained local dev stack: Vite dev server with HMR (edit src/, the
# browser updates instantly), own Postgres, no external networks, no secrets
# manager. nginx exists only in the production image (Dockerfile).
#
#   make local-up      # http://localhost:5173, /api proxied by Vite
#   make local-import  # load the KTZH population dataset
name: demos-local
services:
  dev:
    image: node:24-slim
    working_dir: /app
    # uid 1000 so nothing in the bind-mounted tree ends up root-owned
    user: "1000:1000"
    command:
      - sh
      - -c
      - mkdir -p /tmp/bin &&
        corepack enable --install-directory /tmp/bin &&
        export PATH=/tmp/bin:$$PATH &&
        pnpm install && pnpm dev --host
    environment:
      - HOME=/tmp
      - DEMOS_API_PROXY=http://api:3000
      - PNPM_CONFIG_MINIMUM_RELEASE_AGE=0
    ports:
      - "${DEMOS_LOCAL_PORT:-5173}:5173"
    volumes:
      - .:/app
    depends_on: [api]
    restart: unless-stopped
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=demos
      - PGDATABASE=demos
      - DEMOS_DB_PASSWORD=${DEMOS_DB_PASSWORD:-demos-local-dev}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=demos
      - POSTGRES_DB=demos
      - POSTGRES_PASSWORD=${DEMOS_DB_PASSWORD:-demos-local-dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demos"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
volumes:
  pgdata:
