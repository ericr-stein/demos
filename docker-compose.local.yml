# Self-contained local stack: own Postgres, no external networks, no secrets
# manager, no tunnel. For the devbox deployment see docker-compose.yml.
#
#   make local-up      # build + start, web on http://localhost:8080
#   make local-import  # load the KTZH population dataset
name: demos-local
services:
  web:
    build: .
    ports:
      - "${DEMOS_LOCAL_PORT:-8080}:80"
    volumes:
      - ./nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [api]
    restart: unless-stopped
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=demos
      - PGDATABASE=demos
      - DEMOS_DB_PASSWORD=${DEMOS_DB_PASSWORD:-demos-local-dev}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=demos
      - POSTGRES_DB=demos
      - POSTGRES_PASSWORD=${DEMOS_DB_PASSWORD:-demos-local-dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demos"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
volumes:
  pgdata:
